[client]
# 🚫 Desactiva por completo el menú nativo de páginas antes de renderizar
showSidebarNavigation = false

[theme]
# Naranja premium idéntico al de tus degradados y botones
primaryColor = "#FF6B2B" 

# 🎨 Fondo global de la app (Crema suave, igual al de tu CSS)
backgroundColor = "#FDF6F0" 

# 🚪 Fondo del Sidebar (Blanco puro, igual al de tu CSS)
secondaryBackgroundColor = "#FFFFFF" 

# Color del texto principal para alto contraste
textColor = "#333333" 
font = "sans serif"